chain:
  private_key: "replace-with-wallet-private-key"
  contract_address: "0xad4F9eD0F2b51A26314C9f83DF588cCcE26ae03c"
  rpc_url: ""
  broker_chain_url: "https://dash.broker-chain.com:443/"
  use_broker_chain: true

server:
  http_listen: ":8081"

mysql:
  dsn: "prediction:replace-with-mysql-password@tcp(127.0.0.1:3306)/prediction_market?charset=utf8mb4&parseTime=true&loc=UTC"
  max_open_connections: 10
  max_idle_connections: 5
  connection_max_lifetime_seconds: 300

ipfs:
  gateway: "http://127.0.0.1:8080/ipfs/"

oracle:
  gold_api_url: "https://api.gold-api.com/price/XAU"
  sina_url: "https://hq.sinajs.cn/list=hf_XAU"
